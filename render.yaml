services:
  - type: keyvalue
    name: smartdirect-redis
    region: virginia
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: smartdirect-api
    runtime: docker
    region: virginia
    plan: starter
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: DB_SYNCHRONIZE
        value: "true"
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: REDIS_URL
        fromService:
          name: smartdirect-redis
          type: keyvalue
          property: connectionString
